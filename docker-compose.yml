version: '3.8'

services:
  # Backend Core
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: nodalis-core
    ports:
      - "3000:3000"
    volumes:
      - ./definitions:/app/definitions:ro
      - ./.nodalis:/app/.nodalis
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Reachable via the published port mapping; loopback-only would hide it.
      - HTTP_HOST=0.0.0.0
      - RUN_HTTP_SERVER=true
    restart: unless-stopped
    networks:
      - archi-network

  # Frontend Web
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: nodalis-web
    ports:
      - "8080:80"
    depends_on:
      - core
    restart: unless-stopped
    networks:
      - archi-network

networks:
  archi-network:
    driver: bridge
